<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 元信息优先加载 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 宁夏药监局数据中台</title>

  <!-- 外部资源引入优化 -->
  <script src="https://cdn.tailwindcss.com" defer></script>
  <link rel="stylesheet" href="./components/styles.css">

  <!-- 内联脚本移至底部，非必要异步加载 -->
  <script type="module" defer>
    document.addEventListener("DOMContentLoaded", () => {
      const insScript = document.createElement("script");
      const date = Date.now();
      insScript.src = `/inscode_devtools_sdk.js?v=${date}`;
      insScript.type = "module";
      document.body.appendChild(insScript);
    });
  </script>

  <style>
    /* 基础样式抽离 + 变量化，提升可维护性 */
    :root {
      --primary-color: #0EA5E9;
      --primary-dark: #0284C7;
      --bg-dark-1: #0F172A;
      --bg-dark-2: #1E293B;
      --bg-dark-3: #0C4A6E;
      --text-light: #94A3B8;
      --text-gray: #64748B;
      --border-gray: #E5E7EB;
      --shadow-primary: rgba(14, 165, 233, 0.1);
      --shadow-hover: rgba(14, 165, 233, 0.3);
      --transition-base: all 0.2s ease;
    }

    /* 重置 + 基础布局 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, var(--bg-dark-1) 0%, var(--bg-dark-2) 50%, var(--bg-dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    .login-bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.1;
      background-image:
        radial-gradient(circle at 20% 80%, var(--primary-color) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #10B981 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, #8B5CF6 0%, transparent 40%);
      pointer-events: none; /* 避免遮挡交互 */
    }

    .login-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      color: white;
      position: relative;
      z-index: 1;
    }

    .login-right {
      width: 480px;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      position: relative;
      z-index: 1;
    }

    /* 品牌样式 */
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px var(--shadow-hover);
    }

    .brand-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .brand-subtitle {
      font-size: 16px;
      color: var(--text-light);
    }

    /* 登录表单样式 */
    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--bg-dark-1);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-gray);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      font-size: 14px;
      transition: var(--transition-base);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--shadow-primary);
    }

    .form-input-icon {
      position: relative;
    }

    .form-input-icon input {
      padding-left: 44px;
    }

    .form-input-icon svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      pointer-events: none;
    }

    /* 验证码样式 */
    .captcha-group {
      display: flex;
      gap: 12px;
    }

    .captcha-input {
      flex: 1;
    }

    .captcha-image {
      width: 120px;
      height: 44px;
      background: linear-gradient(135deg, #F3F4F6, var(--border-gray));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #374151;
      letter-spacing: 4px;
      cursor: pointer;
      user-select: none;
      transition: var(--transition-base);
    }

    .captcha-image:hover {
      opacity: 0.9;
    }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px var(--shadow-hover);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* 角色选择 */
    .role-selector {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-gray);
    }

    .role-title {
      font-size: 12px;
      color: #9CA3AF;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .role-options {
      display: flex;
      gap: 8px;
    }

    .role-option {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition-base);
    }

    .role-option:hover {
      border-color: var(--primary-color);
      background: #F0F9FF;
    }

    .role-option.active {
      border-color: var(--primary-color);
      background: var(--primary-color);
      color: white;
    }

    .role-option-icon {
      width: 32px;
      height: 32px;
      margin: 0 auto 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F3F4F6;
    }

    .role-option.active .role-option-icon {
      background: rgba(255,255,255,0.2);
    }

    .role-option-name {
      font-size: 12px;
      font-weight: 500;
    }

    /* 左侧功能介绍 */
    .features {
      margin-top: 60px;
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .feature-content p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.5;
    }

    /* 统计栏 */
    .stats-bar {
      position: absolute;
      bottom: 60px;
      left: 60px;
      right: 60px;
      display: flex;
      gap: 40px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary-color);
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-light);
    }

    /* 记住密码/忘记密码 */
    .remember-forgot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #4B5563;
      cursor: pointer;
    }

    .checkbox-label input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-color);
    }

    .forgot-link {
      font-size: 14px;
      color: var(--primary-color);
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* 加载遮罩 */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-gray);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式优化 */
    @media (max-width: 1024px) {
      .login-left {
        display: none;
      }

      .login-right {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        padding: 40px 20px; /* 移动端减少内边距，提升适配性 */
      }

      .stats-bar {
        display: none; /* 移动端隐藏统计栏，节省空间 */
      }
    }

    /* 小屏适配 */
    @media (max-width: 480px) {
      .role-options {
        flex-direction: column; /* 移动端角色选择纵向排列 */
      }

      .captcha-group {
        flex-direction: column;
      }

      .captcha-image {
        width: 100%;
        height: 48px;
      }
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-bg-pattern"></div>

  <!-- 左侧品牌区 -->
  <div class="login-left">
    <div class="brand-logo">

    <h1 class="text-4xl font-bold mb-6">智慧监管<br/>数据赋能</h1>
    <p class="text-lg text-slate-400 mb-12 max-w-md">

    <div class="features">

      <div class="feature-item">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>

          <p>AI驱动的风险识别与预警推送</p>

      <div class="feature-item">
        <div class="feature-icon">
          <svg class="w-6 h-6 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>

  <!-- 右侧登录区 -->

<!-- 脚本移至底部，提升渲染性能 -->
<script>
  // 严格模式，减少语法错误
  'use strict';

  // DOM元素缓存（减少重复查询DOM）
  const DOM = {
    captchaImage: document.getElementById('captchaImage'),
    loginForm: document.getElementById('loginForm'),
    username: document.getElementById('username'),
    password: document.getElementById('password'),
    captcha: document.getElementById('captcha'),
    loadingOverlay: document.getElementById('loadingOverlay'),
    roleOptions: document.querySelectorAll('.role-option')
  };

  // 验证码字符集（排除易混淆字符：0/O, 1/I, 8/B等）
  const CAPTCHA_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

  // 初始化验证码
  function initCaptcha() {
    let code = '';
    for (let i = 0; i < 4; i++) {
      code += CAPTCHA_CHARS[Math.floor(Math.random() * CAPTCHA_CHARS.length)];
    }
    DOM.captchaImage.textContent = code;
  }

  // 选择角色
  function selectRole(element) {
    DOM.roleOptions.forEach(opt => opt.classList.remove('active'));
    element.classList.add('active');

    // 根据角色设置默认用户名
    const role = element.dataset.role;
    const usernames = {
      admin: 'admin',
      operator: 'operator01',
      leader: 'leader01'
    };
    DOM.username.value = usernames[role] || 'admin';
  }

  // 处理登录
  async function handleLogin(e) {
    e.preventDefault();

    // 获取表单值
    const username = DOM.username.value.trim();
    const password = DOM.password.value.trim();
    const captcha = DOM.captcha.value.trim().toUpperCase();
    const actualCaptcha = DOM.captchaImage.textContent.trim();

    // 表单验证
    if (!username) return alert('请输入用户名');
    if (!password) return alert('请输入密码');
    if (!captcha) return alert('请输入验证码');
    if (captcha !== actualCaptcha) return alert('验证码错误，请重新输入');

    // 显示加载
    DOM.loadingOverlay.classList.add('active');

    try {
      // 模拟登录请求（实际项目替换为真实接口）
      await new Promise(resolve => setTimeout(resolve, 500));

      // 保存登录状态（优化：使用sessionStorage + localStorage 分级存储）
      const loginInfo = {
        isLoggedIn: true,
        username,
        loginTime: new Date().toISOString(),
        role: document.querySelector('.role-option.active').dataset.role
      };
      localStorage.setItem('loginInfo', JSON.stringify(loginInfo));

      // 跳转到首页
      window.location.href = 'index.html';
    } catch (error) {
      alert('登录失败，请重试');
      DOM.loadingOverlay.classList.remove('active');
    }
  }

  // 检查登录状态（优化逻辑，避免死循环）
  function checkLoginStatus() {
    try {
      const loginInfo = JSON.parse(localStorage.getItem('loginInfo') || '{}');
      // 如果已登录且当前页面不是首页，跳转到首页
      if (loginInfo.isLoggedIn && window.location.pathname !== '/index.html') {
        window.location.href = 'index.html';
      }
    } catch (e) {
      localStorage.removeItem('loginInfo'); // 清除损坏的存储数据
    }
  }

  // 初始化事件监听
  function initEventListeners() {
    // 验证码刷新
    DOM.captchaImage.addEventListener('click', initCaptcha);

    // 登录表单提交
    DOM.loginForm.addEventListener('submit', handleLogin);

    // 角色选择
    DOM.roleOptions.forEach(option => {
      option.addEventListener('click', () => selectRole(option));
    });
  }

  // 页面初始化
  function init() {
    localStorage.removeItem('loginInfo'); // 清除损坏的存储数据
    initCaptcha();
    initEventListeners();
    checkLoginStatus();
  }

  // 页面加载完成后初始化
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
