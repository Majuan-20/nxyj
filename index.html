<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="宁夏药监局数据中台 - 药品监管大数据可视化驾驶舱">
  <title>药品监管大数据驾驶舱</title>
  <script src="https://cdn.tailwindcss.com" defer></script>
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/province/ningxia.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #0d1421 100%);
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .data-card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(59, 130, 246, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .data-card:hover {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 25px rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
    }

    .kpi-value {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa 0%, #22d3ee 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
    }

    .kpi-value.warning {
      background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .chart-container {
      width: 100%;
      height: 100%;
      min-height: 280px;
    }

    .map-container {
      width: 100%;
      height: 420px;
    }
  </style>
</head>

<body>
<!-- 顶部导航 -->
<div class="px-6 py-4 bg-slate-900/80 border-b border-blue-900/30 flex justify-between items-center sticky top-0 z-50">
  <h1 class="text-2xl font-bold text-white flex items-center gap-2">
    <i class="fas fa-shield-alt text-blue-400"></i>
    宁夏药品监管大数据驾驶舱
  </h1>
  <div class="flex gap-4">
    <button class="px-3 py-1 bg-blue-900/30 border border-blue-700/30 rounded hover:bg-blue-800/40">今日</button>
    <button class="px-3 py-1 bg-slate-800/50 border border-slate-700/50 rounded hover:bg-slate-700/50">本周</button>
    <button class="px-3 py-1 bg-slate-800/50 border border-slate-700/50 rounded hover:bg-slate-700/50">本月</button>
  </div>
</div>

<!-- KPI 指标区 -->
<div class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
  <div class="data-card p-5">
    <div class="text-sm text-slate-400">监管企业</div>
    <div class="kpi-value">3,156</div>
    <div class="text-xs text-emerald-400">+2.3%</div>
  </div>
  <div class="data-card p-5">
    <div class="text-sm text-slate-400">许可审批</div>
    <div class="kpi-value">68</div>
    <div class="text-xs text-emerald-400">+12.5%</div>
  </div>
  <div class="data-card p-5">
    <div class="text-sm text-slate-400">监督检查</div>
    <div class="kpi-value">1,452</div>
    <div class="text-xs text-emerald-400">+8.7%</div>
  </div>
  <div class="data-card p-5">
    <div class="text-sm text-slate-400">风险预警</div>
    <div class="kpi-value warning">32</div>
    <div class="text-xs text-red-400">-15.2%</div>
  </div>
  <div class="data-card p-5">
    <div class="text-sm text-slate-400">阳光药店</div>
    <div class="kpi-value">865</div>
    <div class="text-xs text-emerald-400">+9.4%</div>
  </div>
  <div class="data-card p-5">
    <div class="text-sm text-slate-400">A级企业</div>
    <div class="kpi-value">1,286</div>
    <div class="text-xs text-emerald-400">+4.2%</div>
  </div>
</div>

<!-- 图表区域 -->
<div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
  <!-- 左侧：宁夏地图 -->
  <div class="data-card p-4 lg:col-span-2">
    <div class="text-lg font-medium mb-2">宁夏监管分布地图</div>
    <div id="mapChart" class="map-container"></div>
  </div>

  <!-- 右侧：风险分级 -->
  <div class="data-card p-4">
    <div class="text-lg font-medium mb-2">企业风险分级</div>
    <div id="riskLevelChart" class="chart-container"></div>
  </div>
</div>

<div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="data-card p-4">
    <div class="text-lg font-medium mb-2">监管趋势</div>
    <div id="lineChart" class="chart-container"></div>
  </div>
  <div class="data-card p-4">
    <div class="text-lg font-medium mb-2">各市企业统计</div>
    <div id="barChart" class="chart-container"></div>
  </div>
  <div class="data-card p-4">
    <div class="text-lg font-medium mb-2">阳光药店状态</div>
    <div id="pharmacyChart" class="chart-container"></div>
  </div>
</div>

<script>
  'use strict';
  document.addEventListener('DOMContentLoaded', function () {
    const chartTheme = {
      backgroundColor: 'transparent',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      tooltip: {
        backgroundColor: 'rgba(15,23,42,.92)',
        borderColor: 'rgba(59,130,246,.5)',
        borderWidth: 1, textStyle: { color: '#fff' }, padding: [10,14]
      },
      legend: { textStyle: { color: '#94a3b8' } },
      axis: {
        axisLine: { lineStyle: { color: 'rgba(59,130,246,.3)' } },
        axisTick: { show: false },
        axisLabel: { color: '#94a3b8' },
        splitLine: { lineStyle: { color: 'rgba(59,130,246,.12)' } }
      }
    };

    const gradientBlue = new echarts.graphic.LinearGradient(0,0,0,1,[
      {offset:0,color:'rgba(59,130,246,.9)'},
      {offset:1,color:'rgba(6,182,212,.7)'}
    ]);

    const glowEffect = { shadowBlur: 18, shadowColor: 'rgba(59,130,246,.6)' };
    const flowEffect = { show: true, period: 5, trailLength: 0.3, symbolSize: 8, color: '#3b82f6' };

    let charts = {};

    // 地图
    function initMapChart() {
      const dom = document.getElementById('mapChart');
      const chart = echarts.init(dom);
      charts.map = chart;
      chart.setOption({
        ...chartTheme, tooltip: { trigger: 'item' },
        geo: {
          map: '宁夏', roam: false, zoom: 1.25,
          itemStyle: { areaColor: 'rgba(30,41,59,.2)', borderColor: 'rgba(59,130,246,.5)', borderWidth: 1.5 },
          emphasis: { itemStyle: { areaColor: 'rgba(59,130,246,.3)', ...glowEffect }, label: { color: '#fff' } }
        },
        series: [
          {
            type: 'map', geoIndex: 0,
            data: [
              { name: '银川市', value: 1206 }, { name: '石嘴山市', value: 542 },
              { name: '吴忠市', value: 685 }, { name: '固原市', value: 318 }, { name: '中卫市', value: 407 }
            ],
            itemStyle: { color: gradientBlue }, label: { color: '#fff' }
          },
          { type: 'lines', zlevel: 1, effect: flowEffect, data: [
              { coords: [[106.27,38.47], [105.67,37.27]] },
              { coords: [[106.27,38.47], [104.92,37.97]] }
            ]}
        ]
      });
      chart.on('click', () => location.href = '/pages/region/');
    }

    // 风险分级
    function initRiskLevelChart() {
      const dom = document.getElementById('riskLevelChart');
      const chart = echarts.init(dom);
      charts.risk = chart;
      chart.setOption({
        ...chartTheme, tooltip: { trigger: 'axis' },
        xAxis: { ...chartTheme.axis, type: 'category', data: ['A级','B级','C级','D级'] },
        yAxis: { ...chartTheme.axis, type: 'value' },
        series: [{
          name: '企业数', type: 'bar', barWidth: '50%',
          itemStyle: {
            color: (p) => ['#10b981','#f59e0b','#f97316','#ef4444'][p.dataIndex],
            borderRadius: [4,4,0,0], ...glowEffect
          },
          data: [1286,854,326,98]
        }]
      });
      chart.on('click', () => location.href = '/pages/risk/');
    }

    // 折线
    function initLineChart() {
      const dom = document.getElementById('lineChart');
      const chart = echarts.init(dom);
      charts.line = chart;
      chart.setOption({
        ...chartTheme, tooltip: { trigger: 'axis' },
        xAxis: { ...chartTheme.axis, type: 'category', data: ['1日','2日','3日','4日','5日','6日','7日'] },
        yAxis: { ...chartTheme.axis, type: 'value' },
        series: [{
          name: '数量', type: 'line', smooth: true,
          lineStyle: { color: '#06b6d4', width: 3 },
          itemStyle: { color: '#3b82f6', ...glowEffect },
          areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[
              {offset:0,color:'rgba(59,130,246,.25)'},{offset:1,color:'rgba(6,182,212,.05)'}
            ])},
          data: [120,182,241,264,280,310,350]
        }]
      });
    }

    // 柱状
    function initBarChart() {
      const dom = document.getElementById('barChart');
      const chart = echarts.init(dom);
      charts.bar = chart;
      chart.setOption({
        ...chartTheme, tooltip: { trigger: 'axis' },
        xAxis: { ...chartTheme.axis, type: 'category', data: ['银川','吴忠','固原','中卫','石嘴山'] },
        yAxis: { ...chartTheme.axis, type: 'value' },
        series: [{
          name: '企业数', type: 'bar', barWidth: '42%',
          itemStyle: { color: gradientBlue, borderRadius: [4,4,0,0], ...glowEffect },
          data: [820,632,410,370,290]
        }]
      });
      chart.on('click', () => Object.values(charts).forEach(c => c.resize()));
    }

    // 阳光药店
    function initPharmacyChart() {
      const dom = document.getElementById('pharmacyChart');
      const chart = echarts.init(dom);
      charts.pharmacy = chart;
      chart.setOption({
        ...chartTheme, tooltip: { trigger: 'item' },
        series: [{
          name: '药店', type: 'pie', radius: ['40%','70%'],
          itemStyle: { borderRadius:8, borderColor:'#0f172a', borderWidth:2, ...glowEffect },
          label: { color:'#e2e8f0' },
          data: [
            { value:865, name:'已达标' },
            { value:243, name:'待整改' },
            { value:98, name:'未开通' }
          ]
        }]
      });
      chart.on('click', () => location.href = '/pages/pharmacy/');
    }

    // 启动
    initMapChart();
    initRiskLevelChart();
    initLineChart();
    initBarChart();
    initPharmacyChart();

    // 自适应
    window.addEventListener('resize', () => Object.values(charts).forEach(c => c.resize()));
  });
</script>
</body>
</html>
