<script>
  // 初始化
  document.addEventListener('DOMContentLoaded', () => {
    initCharts();
    loadTableData();
  });

  // 初始化图表
  function initCharts() {
    initTrendChart();
    initTypeChart();
  }

  // 趋势图表
  function initTrendChart() {
    const chart = echarts.init(document.getElementById('trendChart'));
    const option = {
      ...ChartTheme.commonOption,
      tooltip: { trigger: 'axis' },
      legend: { data: ['立案', '结案'], bottom: 0 },
      grid: { left: 10, right: 10, top: 20, bottom: 40, containLabel: true },
      xAxis: {
        type: 'category',
        data: ['12/01', '12/05', '12/10', '12/15', '12/20', '12/25', '12/30'],
        axisLine: { lineStyle: { color: '#E2E8F0' } },
        axisLabel: { color: '#64748B' }
      },
      yAxis: {
        type: 'value',
        axisLine: { show: false },
        splitLine: { lineStyle: { color: '#F1F5F9' } },
        axisLabel: { color: '#64748B' }
      },
      series: [
        {
          name: '立案',
          type: 'line',
          smooth: true,
          data: [3, 5, 4, 6, 8, 5, 7],
          lineStyle: { color: '#EF4444', width: 2 },
          areaStyle: {
            color: {
              type: 'linear',
              x: 0, y: 0, x2: 0, y2: 1,
              colorStops: [
                { offset: 0, color: 'rgba(239, 68, 68, 0.3)' },
                { offset: 1, color: 'rgba(239, 68, 68, 0.05)' }
              ]
            }
          }
        },
        {
          name: '结案',
          type: 'line',
          smooth: true,
          data: [2, 3, 5, 4, 6, 4, 5],
          lineStyle: { color: '#10B981', width: 2 }
        }
      ]
    };
    chart.setOption(option);
    window.addEventListener('resize', () => chart.resize());
  }

  // 类型分布图表
  function initTypeChart() {
    const chart = echarts.init(document.getElementById('typeChart'));
    const option = {
      ...ChartTheme.commonOption,
      tooltip: { trigger: 'item', formatter: '{b}: {c}件 ({d}%)' },
      legend: { orient: 'vertical', right: 20, top: 'center' },
      series: [{
        type: 'pie',
        radius: ['40%', '70%'],
        center: ['35%', '50%'],
        avoidLabelOverlap: false,
        label: { show: false },
        data: [
          { value: 16, name: '药品违法', itemStyle: { color: '#EF4444' } },
          { value: 11, name: '医疗器械违法', itemStyle: { color: '#F59E0B' } },
          { value: 7, name: '化妆品违法', itemStyle: { color: '#8B5CF6' } },
          { value: 2, name: '其他', itemStyle: { color: '#64748B' } }
        ]
      }]
    };
    chart.setOption(option);
    window.addEventListener('resize', () => chart.resize());
  }

  // 加载表格数据
  function loadTableData() {
    const data = [

  // Toast提示
  function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>${message}</span>
      `;

    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
