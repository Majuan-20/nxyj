  // 初始化

  // 加载表格数据
  function loadTableData() {
    const data = [
      { name: '系统超级管理员', type: 'admin', typeText: '系统管理员', users: 3, funcPerm: 86, dataPerm: '全部', regionPerm: '全区', status: 'active', createTime: '2024-01-15' },
      { name: '审批业务管理员', type: 'business', typeText: '业务管理员', users: 12, funcPerm: 24, dataPerm: '辖区', regionPerm: '银川市', status: 'active', createTime: '2024-02-20' },
      { name: '监管业务管理员', type: 'business', typeText: '业务管理员', users: 18, funcPerm: 28, dataPerm: '辖区', regionPerm: '全区', status: 'active', createTime: '2024-02-20' },
      { name: '检验业务管理员', type: 'business', typeText: '业务管理员', users: 8, funcPerm: 18, dataPerm: '辖区', regionPerm: '全区', status: 'active', createTime: '2024-03-10' },
      { name: '市级查看员', type: 'viewer', typeText: '普通查看员', users: 45, funcPerm: 12, dataPerm: '辖区', regionPerm: '各市', status: 'active', createTime: '2024-03-15' },
      { name: '县级查看员', type: 'viewer', typeText: '普通查看员', users: 62, funcPerm: 8, dataPerm: '辖区', regionPerm: '各县区', status: 'active', createTime: '2024-03-15' },
      { name: '企业用户', type: 'viewer', typeText: '普通查看员', users: 2800, funcPerm: 5, dataPerm: '自身', regionPerm: '-', status: 'active', createTime: '2024-04-01' },
      { name: '临时审计员', type: 'custom', typeText: '自定义角色', users: 2, funcPerm: 35, dataPerm: '全部', regionPerm: '全区', status: 'inactive', createTime: '2024-06-01' },
      { name: '风险预警专员', type: 'business', typeText: '业务管理员', users: 6, funcPerm: 22, dataPerm: '辖区', regionPerm: '全区', status: 'active', createTime: '2024-07-10' },
      { name: '数据治理专员', type: 'business', typeText: '业务管理员', users: 4, funcPerm: 30, dataPerm: '全部', regionPerm: '全区', status: 'active', createTime: '2024-08-05' }
    ];

    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = data.map(item => `
        <tr>
          <td class="font-medium">${item.name}</td>
          <td><span class="badge badge-${item.type === 'admin' ? 'danger' : item.type === 'business' ? 'info' : item.type === 'viewer' ? 'success' : 'warning'}">${item.typeText}</span></td>
          <td>${item.users}</td>
          <td>${item.funcPerm}项</td>
          <td>${item.dataPerm}</td>
          <td>${item.regionPerm}</td>
          <td>
            <span class="badge badge-${item.status === 'active' ? 'success' : 'neutral'}">
              ${item.status === 'active' ? '启用' : '禁用'}
            </span>
          </td>
          <td>${item.createTime}</td>
          <td>
            <button class="btn btn-sm btn-ghost" onclick="viewDetail('${item.name}')">查看</button>
            <button class="btn btn-sm btn-ghost" onclick="editRole('${item.name}')">编辑</button>
            <button class="btn btn-sm btn-ghost text-red-600" onclick="deleteRole('${item.name}')">删除</button>
          </td>
        </tr>
      `).join('');
  }

  // 打开新建弹窗
  function openCreateModal() {
    document.getElementById('modalTitle').textContent = '新建角色';
    document.getElementById('roleName').value = '';
    document.getElementById('roleType').value = '';
    Modal.open('roleModal');
  }

  // 编辑角色
  function editRole(name) {
    document.getElementById('modalTitle').textContent = '编辑角色：' + name;
    // 这里应该加载现有角色数据
    Modal.open('roleModal');
  }

  // 查看详情
  function viewDetail(name) {
    showToast('查看角色详情：' + name, 'info');
  }

  // 删除角色
  function deleteRole(name) {
    if (confirm('确定要删除角色 "' + name + '" 吗？此操作不可恢复。')) {
      showToast('角色已删除', 'success');
      loadTableData();
    }
  }

  // 保存角色
  function saveRole() {
    const name = document.getElementById('roleName').value;
    const type = document.getElementById('roleType').value;

    if (!name || !type) {
      showToast('请填写必填项', 'warning');
      return;
    }

    showToast('角色已保存', 'success');
    Modal.close('roleModal');
    loadTableData();
  }

  // 搜索
  function searchData() {
    showToast('查询中...', 'info');
    setTimeout(() => {
      loadTableData();
      showToast('查询完成', 'success');
    }, 500);
  }

  // 重置筛选
  function resetFilter() {
    document.getElementById('typeFilter').value = '';
    document.getElementById('statusFilter').value = '';
    document.getElementById('searchInput').value = '';
    loadTableData();
    showToast('筛选已重置', 'success');
  }

  // Toast 提示
  function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>${message}</span>
      `;

    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
</script>
</body>
</html>
