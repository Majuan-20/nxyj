<script>
  // 初始化
  document.addEventListener('DOMContentLoaded', () => {
    initCharts();
    loadLogData();
  });

  // 初始化图表
  function initCharts() {
    initTrendChart();
    initTypeChart();
  }

  // 操作趋势图表
  function initTrendChart() {
    const chart = echarts.init(document.getElementById('trendChart'));
    const option = {
      ...ChartTheme.commonOption,
      tooltip: { trigger: 'axis' },
      legend: { data: ['成功', '失败'], bottom: 0 },
      grid: { left: 10, right: 10, top: 20, bottom: 40, containLabel: true },
      xAxis: {
        type: 'category',
        data: ['12/27', '12/28', '12/29', '12/30', '12/31', '01/01', '01/02'],
        axisLine: { lineStyle: { color: '#E2E8F0' } },
        axisLabel: { color: '#64748B' }
      },
      yAxis: {
        type: 'value',
        axisLine: { show: false },
        splitLine: { lineStyle: { color: '#F1F5F9' } },
        axisLabel: { color: '#64748B' }
      },
      series: [
        {
          name: '成功',
          type: 'bar',
          stack: 'total',
          data: [320, 350, 380, 420, 390, 280, 350],
          itemStyle: { color: '#10B981', borderRadius: [4, 4, 0, 0] }
        },
        {
          name: '失败',
          type: 'bar',
          stack: 'total',
          data: [12, 8, 15, 10, 18, 5, 12],
          itemStyle: { color: '#EF4444', borderRadius: [4, 4, 0, 0] }
        }
      ]
    };
    chart.setOption(option);
    window.addEventListener('resize', () => chart.resize());
  }

  // 操作类型分布
  function initTypeChart() {
    const chart = echarts.init(document.getElementById('typeChart'));
    const option = {
      ...ChartTheme.commonOption,
      tooltip: { trigger: 'item', formatter: '{b}: {c}次 ({d}%)' },
      legend: { orient: 'vertical', right: 20, top: 'center' },
      series: [{
        type: 'pie',
        radius: ['40%', '70%'],
        center: ['35%', '50%'],
        avoidLabelOverlap: false,
        label: { show: false },
        data: [
          { value: 856, name: '查看', itemStyle: { color: '#0EA5E9' } },
          { value: 520, name: '修改', itemStyle: { color: '#F59E0B' } },
          { value: 380, name: '新增', itemStyle: { color: '#10B981' } },
          { value: 245, name: '导出', itemStyle: { color: '#8B5CF6' } },
          { value: 180, name: '审批', itemStyle: { color: '#6366F1' } },
          { value: 95, name: '删除', itemStyle: { color: '#EF4444' } },
          { value: 42, name: '其他', itemStyle: { color: '#64748B' } }
        ]
      }]
    };
    chart.setOption(option);
    window.addEventListener('resize', () => chart.resize());
  }

  // 加载日志数据
  function loadLogData() {
    const data = [
      { time: '2024-12-31 15:42:18', user: '张管理员', type: 'update', object: '企业信息', result: 'success', ip: '192.168.1.100', detail: '修改企业信用等级' },
      { time: '2024-12-31 15:38:05', user: '李审核员', type: 'approve', object: '行政许可', result: 'success', ip: '192.168.1.105', detail: '审批通过药品经营许可证' },
      { time: '2024-12-31 15:32:41', user: '王检查员', type: 'create', object: '检查记录', result: 'success', ip: '192.168.1.112', detail: '新增日常监督检查记录' },
      { time: '2024-12-31 15:28:19', user: '赵管理员', type: 'delete', object: '预警信息', result: 'failure', ip: '192.168.1.108', detail: '删除预警失败 - 权限不足' },
      { time: '2024-12-31 15:22:56', user: '张管理员', type: 'export', object: '企业名单', result: 'success', ip: '192.168.1.100', detail: '导出辖区企业名单 Excel' },
      { time: '2024-12-31 15:18:33', user: '刘办事员', type: 'view', object: '审批详情', result: 'success', ip: '192.168.1.115', detail: '查看行政许可申请详情' },
      { time: '2024-12-31 15:12:07', user: '陈检查员', type: 'update', object: '整改记录', result: 'success', ip: '192.168.1.120', detail: '更新企业整改状态' },
      { time: '2024-12-31 15:05:44', user: '杨审核员', type: 'approve', object: '医疗器械', result: 'success', ip: '192.168.1.125', detail: '审批医疗器械注册证' },
      { time: '2024-12-31 14:58:21', user: '周管理员', type: 'login', object: '系统登录', result: 'success', ip: '192.168.1.130', detail: '用户登录系统' },
      { time: '2024-12-31 14:52:58', user: '吴检查员', type: 'create', object: '抽检记录', result: 'success', ip: '192.168.1.135', detail: '新增产品抽检批次记录' }
    ];

    const tbody = document.getElementById('logTable');
    tbody.innerHTML = data.map(item => {
      const typeMap = {
        'login': { text: '登录/登出', color: 'bg-blue-100 text-blue-700' },
        'view': { text: '查看', color: 'bg-gray-100 text-gray-700' },
        'create': { text: '新增', color: 'bg-emerald-100 text-emerald-700' },
        'update': { text: '修改', color: 'bg-amber-100 text-amber-700' },
        'delete': { text: '删除', color: 'bg-red-100 text-red-700' },
        'export': { text: '导出', color: 'bg-purple-100 text-purple-700' },
        'approve': { text: '审批', color: 'bg-indigo-100 text-indigo-700' }
      };

      const typeInfo = typeMap[item.type] || { text: item.type, color: 'bg-gray-100 text-gray-700' };
      const resultBadge = item.result === 'success'
        ? '<span class="badge badge-success">成功</span>'
        : '<span class="badge badge-danger">失败</span>';

      return `
          <tr>
            <td class="text-sm font-mono">${item.time}</td>
            <td>${item.user}</td>
            <td><span class="text-xs px-2 py-1 rounded ${typeInfo.color}">${typeInfo.text}</span></td>
            <td>${item.object}</td>
            <td>${resultBadge}</td>
            <td class="font-mono text-sm">${item.ip}</td>
            <td>
              <button class="btn btn-sm btn-ghost" onclick="viewDetail('${item.time}')">查看详情</button>
            </td>
          </tr>
        `;
    }).join('');
  }

  // 查看详情
  function viewDetail(time) {
    const content = document.getElementById('detailContent');
    content.innerHTML = `
        <div class="space-y-6">
          <!-- 基本信息 -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-xs text-slate-500 uppercase">操作时间</label>
              <div class="text-sm font-mono font-medium">${time}</div>
            </div>
            <div>
              <label class="text-xs text-slate-500 uppercase">IP 地址</label>
              <div class="text-sm font-mono">192.168.1.100</div>
            </div>
            <div>
              <label class="text-xs text-slate-500 uppercase">操作人员</label>
              <div class="text-sm font-medium">张管理员</div>
            </div>
            <div>
              <label class="text-xs text-slate-500 uppercase">所属部门</label>
              <div class="text-sm">信息中心</div>
            </div>
            <div>
              <label class="text-xs text-slate-500 uppercase">操作类型</label>
              <div class="text-sm">修改</div>
            </div>
            <div>
              <label class="text-xs text-slate-500 uppercase">操作结果</label>
              <div class="text-sm"><span class="badge badge-success">成功</span></div>
            </div>
          </div>

          <!-- 操作详情 -->
          <div>
            <label class="text-xs text-slate-500 uppercase mb-3 block">操作内容</label>
            <div class="bg-slate-50 rounded-lg p-4 border border-slate-200">
              <div class="text-sm">
                <div class="mb-2"><span class="text-slate-500">操作对象：</span>企业信息（ID: ENT202412001）</div>
                <div class="mb-2"><span class="text-slate-500">操作模块：</span>信用管理</div>
                <div class="mb-2"><span class="text-slate-500">操作描述：</span>修改企业信用等级从 B 级调整为 A 级</div>
              </div>
            </div>
          </div>

          <!-- 操作前后对比 -->
          <div>
            <label class="text-xs text-slate-500 uppercase mb-3 block">数据变更对比</label>

  // 搜索日志
  function searchLogs() {
    showToast('查询中...', 'info');
    setTimeout(() => {
      loadLogData();
      showToast('查询完成', 'success');
    }, 500);
  }

  // 重置筛选
  function resetFilters() {
    document.getElementById('timeFilter').value = 'week';
    document.getElementById('typeFilter').value = '';
    document.getElementById('userInput').value = '';
    document.getElementById('objectInput').value = '';
    loadLogData();
    showToast('筛选已重置', 'success');
  }

  // 导出报告
  function exportReport() {
    showToast('正在生成 PDF 报告...', 'info');
    setTimeout(() => {
      showToast('报告已导出：audit_report_20241231.pdf', 'success');
    }, 1500);
  }

  // 导出详情
  function exportDetail() {
    showToast('正在导出详情...', 'info');
    setTimeout(() => {
      showToast('详情已导出', 'success');
      Modal.close('detailModal');
    }, 1000);
  }

  // 切换详情显示
  function toggleDetail() {
    showToast('详情显示模式已切换', 'info');
  }

  // Toast 提示
  function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>${message}</span>
      `;

    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
</script>
