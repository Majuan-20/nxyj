    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = data.map(item => {
      const levelColors = {
        critical: 'bg-red-500',
        high: 'bg-orange-500',
        medium: 'bg-amber-500',
        normal: 'bg-emerald-500'
      };

      const statusBadge = item.status === 'completed' ? '<span class="badge badge-success">已处置</span>' :
        item.status === 'processing' ? '<span class="badge badge-info">处置中</span>' :
          item.status === 'ignored' ? '<span class="badge badge-neutral">已忽略</span>' :
            '<span class="badge badge-danger">未处置</span>';

      return `
          <tr>
            <td><input type="checkbox" class="form-checkbox" data-id="${item.id}"></td>
            <td class="font-mono text-sm">${item.id}</td>
            <td>
              <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full ${levelColors[item.level]}"></div>
                <span class="font-medium">${item.title}</span>
              </div>

            <td><span class="badge badge-${item.level === 'critical' ? 'danger' : item.level === 'high' ? 'risk-high' : item.level === 'medium' ? 'risk-medium' : 'risk-normal'}">${item.levelText}</span></td>

    }).join('');
  }

  // 打开处置表单
  function openProcess(id) {
    Modal.open('processModal');
  }

  // 提交处置
  function submitProcess() {
    showToast('处置信息已提交', 'success');
    Modal.close('processModal');
    Modal.close('detailModal');
    loadTableData();
  }

  // 立即处置
  function processWarning() {
    Modal.close('detailModal');
    openProcess('YJ202412001');
  }

  // 批量处置
  function batchProcess() {
    const checked = document.querySelectorAll('.form-checkbox:checked');
    if (checked.length === 0) {
      showToast('请先选择要处置的预警', 'warning');
      return;
    }
    showToast(`已选择 ${checked.length} 项预警，跳转批量处置...`, 'info');
  }

  // 全选/取消全选
  function toggleAll(checkbox) {
    const checkboxes = document.querySelectorAll('.form-checkbox');
    checkboxes.forEach(cb => cb.checked = checkbox.checked);
  }

  // 规则配置
  function openRuleConfig() {
    showToast('跳转至规则配置页面...', 'info');
  }

  // 搜索
  function searchData() {
    showToast('查询中...', 'info');
    setTimeout(() => {
      loadTableData();
      showToast('查询完成', 'success');
    }, 500);
  }

  // 重置筛选
  function resetFilter() {
    document.getElementById('levelFilter').value = '';
    document.getElementById('typeFilter').value = '';
    document.getElementById('statusFilter').value = '';
    document.getElementById('regionFilter').value = '';
    loadTableData();
    showToast('筛选已重置', 'success');
  }

  // 导出数据
  function exportData() {
    showToast('正在导出 Excel...', 'info');
    setTimeout(() => {
      showToast('导出成功', 'success');
    }, 1000);
  }

  // Toast 提示
  function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>${message}</span>
      `;

    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
