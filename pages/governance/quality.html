  // 数据校验工具函数（核心数据质量保障）
  function validateAndStandardizeData(data) {
    // 业务规则定义
    const validStatus = ['pending', 'processing', 'completed', 'rejected'];
    const validTypes = {
      '药品许可': '药品许可',
      '医疗器械': '医疗器械',
      '化妆品': '化妆品',
      '其他': '其他',
      // 兼容别名映射
      'drug': '药品许可',
      'device': '医疗器械',
      'cosmetic': '化妆品'
    };
    const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
    const idRegex = /^SP\d{8}$/;

    return data.map(item => {
      const cleanedItem = { ...item };

      // 1. 申请编号校验与修正
      if (!idRegex.test(cleanedItem.id)) {
        console.warn(`无效申请编号: ${cleanedItem.id}，自动修正`, item);
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const random = String(Math.floor(Math.random() * 999)).padStart(3, '0');
        cleanedItem.id = `SP${year}${month}${random}`;
      }

      // 2. 状态值标准化
      if (!validStatus.includes(cleanedItem.status)) {
        console.warn(`无效状态值: ${cleanedItem.status}，自动修正为pending`, item);
        cleanedItem.status = 'pending';
      }

      // 3. 审批类型标准化（兼容筛选值映射）
      cleanedItem.type = validTypes[cleanedItem.type] || '其他';

      // 4. 日期格式校验与修正
      if (!dateRegex.test(cleanedItem.date)) {
        console.warn(`无效日期格式: ${cleanedItem.date}，自动修正为当前日期`, item);
        cleanedItem.date = new Date().toISOString().split('T')[0];
      }

      // 5. 剩余天数值校验与修正
      cleanedItem.days = parseInt(cleanedItem.days, 10);
      if (isNaN(cleanedItem.days)) {
        console.warn(`无效剩余天数: ${item.days}，自动修正为0`, item);
        cleanedItem.days = 0;
      }

      // 6. 企业名称去空格
      cleanedItem.name = (cleanedItem.name || '未知企业').trim();

      // 7. 当前节点默认值
      cleanedItem.node = cleanedItem.node || '待分配';

      return cleanedItem;
    });
  }

  // 筛选数据函数（保证筛选准确性）
  function filterData(rawData) {
    const timeFilter = document.getElementById('timeFilter').value;
    const typeFilter = document.getElementById('typeFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;
    const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();

    // 类型筛选映射
    const typeMap = {
      'drug': '药品许可',
      'device': '医疗器械',
      'cosmetic': '化妆品'
    };
    const targetType = typeMap[typeFilter] || typeFilter;

    // 时间筛选逻辑
    function filterByTime(item) {
      const itemDate = new Date(item.date);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const weekStart = new Date(today);
      weekStart.setDate(today.getDate() - today.getDay());
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const yearStart = new Date(today.getFullYear(), 0, 1);

      switch (timeFilter) {
        case 'today': return itemDate >= today;
        case 'week': return itemDate >= weekStart;
        case 'month': return itemDate >= monthStart;
        case 'year': return itemDate >= yearStart;
        default: return true;
      }
    }

    // 多条件组合筛选
    return rawData.filter(item => {
      const typeMatch = !targetType || item.type === targetType;
      const statusMatch = !statusFilter || item.status === statusFilter;
      const searchMatch = !searchKeyword ||
        item.name.toLowerCase().includes(searchKeyword) ||
        item.id.toLowerCase().includes(searchKeyword);
      const timeMatch = filterByTime(item);

      return typeMatch && statusMatch && searchMatch && timeMatch;
    });
  }

  // 更新分页信息（保证数据统计一致性）
  function updatePaginationInfo(total) {
    const pageSize = 10;
    const currentPage = 1; // 简化处理，实际项目可扩展分页逻辑
    const start = total > 0 ? (currentPage - 1) * pageSize + 1 : 0;
    const end = Math.min(currentPage * pageSize, total);

    const paginationInfo = document.querySelector('.pagination-info');
    if (paginationInfo) {
      paginationInfo.textContent = `显示 ${start}-${end} 条，共 ${total} 条`;
    }

    // 禁用/启用分页按钮
    const paginationBtns = document.querySelectorAll('.pagination-btn');
    paginationBtns.forEach((btn, index) => {
      if (index === 0) { // 上一页按钮
        btn.disabled = currentPage === 1;
      } else if (btn.textContent === '1') { // 当前页
        btn.classList.toggle('active', currentPage === 1);
      }
    });
  }

    const filteredData = filterData(validData);

    setTimeout(() => {
      // 模拟导出成功
      showToast(`导出成功！共导出 ${filteredData.length} 条数据`, 'success');
    }, 1000);
  }

  // Toast提示（完善样式和类型）
  function showToast(message, type = 'info') {
    // 定义Toast类型样式
    const typeConfig = {
      success: {
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>',
        bg: 'bg-emerald-50 text-emerald-700 border-emerald-200'
      },
      info: {
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
        bg: 'bg-sky-50 text-sky-700 border-sky-200'
      },
      warning: {
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>',
        bg: 'bg-amber-50 text-amber-700 border-amber-200'
      },
      error: {
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>',
        bg: 'bg-red-50 text-red-700 border-red-200'
      }
    };

    const config = typeConfig[type] || typeConfig.info;
    const toast = document.createElement('div');
    toast.className = `toast ${config.bg} fixed right-4 top-4 border rounded-lg px-4 py-3 flex items-center gap-2 shadow-lg z-50 transition-all duration-300 transform translate-x-0 opacity-100`;
    toast.innerHTML = `
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        ${config.icon}
      </svg>
      <span class="text-sm">${message}</span>
    `;

    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container fixed right-4 top-4 z-50 space-y-2';
      document.body.appendChild(container);
    }

    container.appendChild(toast);

    // 自动关闭
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
